<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>端侧AI实时预警系统 - 演示</title>
    <meta name="description" content="基于TensorFlow Lite的端侧实时生理指标监测与异常预警系统">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        :root {
            --primary-color: #6366f1;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --critical-color: #dc2626;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-card-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.3);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.3);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.4);
            --shadow-glow: 0 0 20px rgba(99, 102, 241, 0.3);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: var(--bg-card);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
        }
        
        .header h1 {
            font-size: 2.5em;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .header p {
            color: var(--text-secondary);
            font-size: 1.1em;
        }
        
        .header .subtitle {
            margin-top: 15px;
            padding: 15px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 10px;
            border-left: 4px solid var(--primary-color);
        }
        
        /* Status Banner */
        .status-banner {
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
        }
        
        .status-banner.normal {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }
        
        .status-banner.warning {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            animation: pulse-warning 2s ease-in-out infinite;
        }
        
        .status-banner.critical {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            animation: pulse-critical 1s ease-in-out infinite;
        }
        
        @keyframes pulse-warning {
            0%, 100% { transform: scale(1); box-shadow: var(--shadow-md); }
            50% { transform: scale(1.02); box-shadow: 0 0 30px rgba(245, 158, 11, 0.5); }
        }
        
        @keyframes pulse-critical {
            0%, 100% { transform: scale(1); box-shadow: var(--shadow-md); }
            50% { transform: scale(1.03); box-shadow: 0 0 40px rgba(239, 68, 68, 0.6); }
        }
        
        .status-info h2 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }
        
        .status-actions {
            display: flex;
            gap: 10px;
        }
        
        /* Buttons */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        /* Cards */
        .card {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 25px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-color);
        }
        
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .card-title {
            font-size: 1.2em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .metric-value {
            font-size: 3em;
            font-weight: 700;
            margin: 15px 0;
            background: linear-gradient(135deg, var(--primary-color) 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .metric-unit {
            font-size: 0.4em;
            color: var(--text-secondary);
            font-weight: 400;
        }
        
        .metric-status {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            display: inline-block;
        }
        
        .metric-status.normal {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success-color);
        }
        
        .metric-status.warning {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning-color);
        }
        
        .metric-status.critical {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger-color);
        }
        
        /* Chart Container */
        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 15px;
        }
        
        /* Alert Panel */
        .alert-panel {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 25px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            max-height: 400px;
            overflow-y: auto;
        }
        
        .alert-item {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            border-left: 4px solid;
            transition: all 0.3s ease;
        }
        
        .alert-item:hover {
            transform: translateX(5px);
        }
        
        .alert-item.critical {
            background: rgba(239, 68, 68, 0.1);
            border-left-color: var(--critical-color);
        }
        
        .alert-item.warning {
            background: rgba(245, 158, 11, 0.1);
            border-left-color: var(--warning-color);
        }
        
        .alert-time {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }
        
        .alert-message {
            font-weight: 500;
        }
        
        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-item {
            background: rgba(99, 102, 241, 0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: 700;
            color: var(--primary-color);
        }
        
        .stat-label {
            font-size: 0.9em;
            color: var(--text-secondary);
            margin-top: 5px;
        }
        
        /* Loading Animation */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #8b5cf6;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .grid {
                grid-template-columns: 1fr;
            }
            
            .metric-value {
                font-size: 2.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🏥 端侧AI实时预警系统</h1>
            <p>基于TensorFlow Lite的轻量级异常检测与实时监测</p>
            <div class="subtitle">
                <strong>技术特性：</strong> INT8量化优化 · 毫秒级推理 · 本地声光预警 · 实时生理指标监测
            </div>
        </div>
        
        <!-- Status Banner -->
        <div id="statusBanner" class="status-banner normal">
            <div class="status-info">
                <h2 id="statusText">🟢 系统正常</h2>
                <p id="statusDetail">所有生理指标正常</p>
            </div>
            <div class="status-actions">
                <button id="startBtn" class="btn btn-success" onclick="startMonitoring()">
                    ▶️ 开始监测
                </button>
                <button id="stopBtn" class="btn btn-danger" onclick="stopMonitoring()" disabled>
                    ⏸️ 停止监测
                </button>
            </div>
        </div>
        
        <!-- Vital Signs Metrics -->
        <div class="grid">
            <!-- Heart Rate -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <span>❤️</span>
                        <span>心率监测</span>
                    </div>
                    <span id="hrStatus" class="metric-status normal">正常</span>
                </div>
                <div class="metric-value" id="heartRate">
                    -- <span class="metric-unit">bpm</span>
                </div>
                <div class="chart-container">
                    <canvas id="hrChart"></canvas>
                </div>
            </div>
            
            <!-- SpO2 -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <span>🫁</span>
                        <span>血氧饱和度</span>
                    </div>
                    <span id="spo2Status" class="metric-status normal">正常</span>
                </div>
                <div class="metric-value" id="spo2">
                    -- <span class="metric-unit">%</span>
                </div>
                <div class="chart-container">
                    <canvas id="spo2Chart"></canvas>
                </div>
            </div>
            
            <!-- Temperature -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <span>🌡️</span>
                        <span>体温监测</span>
                    </div>
                    <span id="tempStatus" class="metric-status normal">正常</span>
                </div>
                <div class="metric-value" id="temperature">
                    -- <span class="metric-unit">°C</span>
                </div>
                <div class="chart-container">
                    <canvas id="tempChart"></canvas>
                </div>
            </div>
            
            <!-- Anomaly Score -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <span>⚡</span>
                        <span>AI异常检测</span>
                    </div>
                    <span id="anomalyStatus" class="metric-status normal">正常</span>
                </div>
                <div class="metric-value" id="anomalyScore">
                    -- <span class="metric-unit"></span>
                </div>
                <div class="chart-container">
                    <canvas id="anomalyChart"></canvas>
                </div>
            </div>
        </div>
        
        <!-- Bottom Section -->
        <div class="grid" style="grid-template-columns: 2fr 1fr;">
            <!-- Alert History -->
            <div class="alert-panel">
                <div class="card-header">
                    <div class="card-title">
                        <span>📢</span>
                        <span>预警历史</span>
                    </div>
                </div>
                <div id="alertHistory">
                    <div style="text-align: center; color: var(--text-secondary); padding: 40px;">
                        暂无预警记录
                    </div>
                </div>
            </div>
            
            <!-- Statistics -->
            <div class="card">
                <div class="card-title">
                    <span>📊</span>
                    <span>系统统计</span>
                </div>
                <div class="stats-grid" style="grid-template-columns: 1fr;">
                    <div class="stat-item">
                        <div class="stat-value" id="totalInferences">0</div>
                        <div class="stat-label">推理次数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="avgInferenceTime">0</div>
                        <div class="stat-label">平均推理时间 (ms)</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalAlerts">0</div>
                        <div class="stat-label">总预警次数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="uptime">00:00:00</div>
                        <div class="stat-label">运行时长</div>
                    </div>
                </div>
                
                <div style="margin-top: 20px;">
                    <h4 style="margin-bottom: 10px;">测试异常场景</h4>
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        <button class="btn btn-primary" onclick="simulateAnomaly('low_spo2')">
                            模拟低血氧
                        </button>
                        <button class="btn btn-primary" onclick="simulateAnomaly('high_hr')">
                            模拟心动过速
                        </button>
                        <button class="btn btn-primary" onclick="simulateAnomaly('low_hr')">
                            模拟心动过缓
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 全局状态
        let isMonitoring = false;
        let monitoringInterval = null;
        let charts = {};
        let stats = {
            totalInferences: 0,
            totalAlerts: 0,
            inferenceTimes: [],
            startTime: null
        };
        
        // 数据历史
        const dataHistory = {
            hr: [],
            spo2: [],
            temp: [],
            anomaly: [],
            timestamps: []
        };
        const maxDataPoints = 20;
        
        // 异常模拟
        let anomalySimulation = {
            active: false,
            type: null,
            endTime: null
        };
        
        // 初始化图表
        function initCharts() {
            const chartConfig = (label, color, unit = '') => ({
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: label,
                        data: [],
                        borderColor: color,
                        backgroundColor: color + '20',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 3,
                        pointHoverRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleColor: '#f1f5f9',
                            bodyColor: '#f1f5f9',
                            borderColor: color,
                            borderWidth: 1,
                            callbacks: {
                                label: (context) => `${label}: ${context.parsed.y.toFixed(2)}${unit}`
                            }
                        }
                    },
                    scales: {
                        y: {
                            ticks: { color: '#94a3b8' },
                            grid: { color: '#334155' }
                        },
                        x: {
                            ticks: { color: '#94a3b8' },
                            grid: { color: '#334155' }
                        }
                    }
                }
            });
            
            charts.hr = new Chart(document.getElementById('hrChart'), 
                chartConfig('心率', '#ef4444', ' bpm'));
            charts.spo2 = new Chart(document.getElementById('spo2Chart'), 
                chartConfig('血氧', '#10b981', '%'));
            charts.temp = new Chart(document.getElementById('tempChart'), 
                chartConfig('体温', '#f59e0b', '°C'));
            charts.anomaly = new Chart(document.getElementById('anomalyChart'), 
                chartConfig('异常分数', '#6366f1'));
        }
        
        // 更新图表
        function updateChart(chart, value, label) {
            if (chart.data.labels.length >= maxDataPoints) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }
            chart.data.labels.push(label);
            chart.data.datasets[0].data.push(value);
            chart.update('none');
        }
        
        // 生成模拟数据
        function generateVitalSigns() {
            const now = Date.now();
            
            // 基础值
            let hr = 70 + (Math.random() - 0.5) * 6;
            let spo2 = 98 + (Math.random() - 0.5);
            let temp = 36.5 + (Math.random() - 0.5) * 0.2;
            
            // 异常模拟
            if (anomalySimulation.active && now < anomalySimulation.endTime) {
                if (anomalySimulation.type === 'low_spo2') {
                    spo2 = 85 + Math.random() * 3;
                } else if (anomalySimulation.type === 'high_hr') {
                    hr = 120 + Math.random() * 20;
                } else if (anomalySimulation.type === 'low_hr') {
                    hr = 45 + Math.random() * 10;
                }
            } else if (anomalySimulation.active && now >= anomalySimulation.endTime) {
                anomalySimulation.active = false;
                addAlert('info', '异常模拟结束，恢复正常');
            }
            
            return { hr, spo2, temp };
        }
        
        // 模拟推理
        function inference(vitalSigns) {
            const startTime = performance.now();
            
            // 计算异常分数
            let anomalyScore = 0;
            
            // 心率异常
            if (vitalSigns.hr < 50) {
                anomalyScore = Math.max(anomalyScore, (50 - vitalSigns.hr) / 50);
            } else if (vitalSigns.hr > 110) {
                anomalyScore = Math.max(anomalyScore, (vitalSigns.hr - 110) / 110);
            }
            
            // 血氧异常
            if (vitalSigns.spo2 < 90) {
                anomalyScore = Math.max(anomalyScore, (90 - vitalSigns.spo2) / 10);
            }
            
            anomalyScore = Math.min(anomalyScore, 1.0);
            
            const inferenceTime = performance.now() - startTime;
            
            return {
                anomalyScore,
                inferenceTime
            };
        }
        
        // 检测异常并预警
        function checkAndAlert(vitalSigns, inferenceResult) {
            const alerts = [];
            
            // 异常分数检查
            if (inferenceResult.anomalyScore > 0.3) {
                const level = inferenceResult.anomalyScore > 0.6 ? 'critical' : 'warning';
                alerts.push({
                    level,
                    message: `检测到异常！异常分数: ${inferenceResult.anomalyScore.toFixed(3)}`
                });
            }
            
            // 血氧检查
            if (vitalSigns.spo2 < 90) {
                const level = vitalSigns.spo2 < 85 ? 'critical' : 'warning';
                alerts.push({
                    level,
                    message: `⚠️ 低血氧预警！当前血氧: ${vitalSigns.spo2.toFixed(1)}%`
                });
            }
            
            // 心率检查
            if (vitalSigns.hr < 50) {
                alerts.push({
                    level: 'warning',
                    message: `⚠️ 心动过缓预警！当前心率: ${vitalSigns.hr.toFixed(0)} bpm`
                });
            } else if (vitalSigns.hr > 110) {
                alerts.push({
                    level: 'warning',
                    message: `⚠️ 心动过速预警！当前心率: ${vitalSigns.hr.toFixed(0)} bpm`
                });
            }
            
            // 触发预警
            alerts.forEach(alert => {
                addAlert(alert.level, alert.message);
                if (alert.level === 'critical') {
                    playAlertSound();
                }
            });
            
            return alerts;
        }
        
        // 添加预警记录
        function addAlert(level, message) {
            stats.totalAlerts++;
            
            const alertHistory = document.getElementById('alertHistory');
            const time = new Date().toLocaleTimeString('zh-CN');
            
            const alertItem = document.createElement('div');
            alertItem.className = `alert-item ${level}`;
            alertItem.innerHTML = `
                <div class="alert-time">${time}</div>
                <div class="alert-message">${message}</div>
            `;
            
            if (alertHistory.children.length > 0 && 
                alertHistory.children[0].style.textAlign === 'center') {
                alertHistory.innerHTML = '';
            }
            
            alertHistory.insertBefore(alertItem, alertHistory.firstChild);
            
            // 限制显示数量
            while (alertHistory.children.length > 10) {
                alertHistory.removeChild(alertHistory.lastChild);
            }
        }
        
        // 播放预警音
        function playAlertSound() {
            // 创建音频上下文
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 800;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.2);
        }
        
        // 更新状态横幅
        function updateStatusBanner(alerts) {
            const banner = document.getElementById('statusBanner');
            const statusText = document.getElementById('statusText');
            const statusDetail = document.getElementById('statusDetail');
            
            if (alerts.length === 0) {
                banner.className = 'status-banner normal';
                statusText.textContent = '🟢 系统正常';
                statusDetail.textContent = '所有生理指标正常';
            } else {
                const hasCritical = alerts.some(a => a.level === 'critical');
                if (hasCritical) {
                    banner.className = 'status-banner critical';
                    statusText.textContent = '🔴 严重预警';
                    statusDetail.textContent = '检测到严重异常，请立即处理！';
                } else {
                    banner.className = 'status-banner warning';
                    statusText.textContent = '🟡 预警中';
                    statusDetail.textContent = `检测到 ${alerts.length} 个异常指标`;
                }
            }
        }
        
        // 更新指标状态
        function updateMetricStatus(elementId, value, normalRange) {
            const element = document.getElementById(elementId);
            if (value < normalRange[0] || value > normalRange[1]) {
                const isCritical = value < normalRange[0] * 0.9 || value > normalRange[1] * 1.1;
                element.className = `metric-status ${isCritical ? 'critical' : 'warning'}`;
                element.textContent = isCritical ? '严重' : '预警';
            } else {
                element.className = 'metric-status normal';
                element.textContent = '正常';
            }
        }
        
        // 监测循环
        function monitoringLoop() {
            const vitalSigns = generateVitalSigns();
            const inferenceResult = inference(vitalSigns);
            const alerts = checkAndAlert(vitalSigns, inferenceResult);
            
            // 更新统计
            stats.totalInferences++;
            stats.inferenceTimes.push(inferenceResult.inferenceTime);
            if (stats.inferenceTimes.length > 100) {
                stats.inferenceTimes.shift();
            }
            
            // 更新显示
            const timestamp = new Date().toLocaleTimeString('zh-CN', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            
            document.getElementById('heartRate').innerHTML = 
                `${vitalSigns.hr.toFixed(1)} <span class="metric-unit">bpm</span>`;
            document.getElementById('spo2').innerHTML = 
                `${vitalSigns.spo2.toFixed(1)} <span class="metric-unit">%</span>`;
            document.getElementById('temperature').innerHTML = 
                `${vitalSigns.temp.toFixed(1)} <span class="metric-unit">°C</span>`;
            document.getElementById('anomalyScore').innerHTML = 
                `${inferenceResult.anomalyScore.toFixed(3)}`;
            
            // 更新图表
            updateChart(charts.hr, vitalSigns.hr, timestamp);
            updateChart(charts.spo2, vitalSigns.spo2, timestamp);
            updateChart(charts.temp, vitalSigns.temp, timestamp);
            updateChart(charts.anomaly, inferenceResult.anomalyScore, timestamp);
            
            // 更新状态
            updateMetricStatus('hrStatus', vitalSigns.hr, [60, 100]);
            updateMetricStatus('spo2Status', vitalSigns.spo2, [95, 100]);
            updateMetricStatus('tempStatus', vitalSigns.temp, [36.2, 37.2]);
            updateMetricStatus('anomalyStatus', inferenceResult.anomalyScore, [0, 0.3]);
            
            // 更新横幅
            updateStatusBanner(alerts);
            
            // 更新统计信息
            updateStats();
        }
        
        // 更新统计信息
        function updateStats() {
            document.getElementById('totalInferences').textContent = stats.totalInferences;
            document.getElementById('totalAlerts').textContent = stats.totalAlerts;
            
            const avgTime = stats.inferenceTimes.length > 0 
                ? stats.inferenceTimes.reduce((a, b) => a + b, 0) / stats.inferenceTimes.length 
                : 0;
            document.getElementById('avgInferenceTime').textContent = avgTime.toFixed(2);
            
            if (stats.startTime) {
                const elapsed = Date.now() - stats.startTime;
                const hours = Math.floor(elapsed / 3600000);
                const minutes = Math.floor((elapsed % 3600000) / 60000);
                const seconds = Math.floor((elapsed % 60000) / 1000);
                document.getElementById('uptime').textContent = 
                    `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }
        }
        
        // 开始监测
        function startMonitoring() {
            if (isMonitoring) return;
            
            isMonitoring = true;
            stats.startTime = Date.now();
            
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            
            addAlert('info', '✓ 监测系统已启动');
            
            monitoringInterval = setInterval(monitoringLoop, 2000);
        }
        
        // 停止监测
        function stopMonitoring() {
            if (!isMonitoring) return;
            
            isMonitoring = false;
            
            clearInterval(monitoringInterval);
            
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            
            addAlert('info', '⏸ 监测系统已停止');
        }
        
        // 模拟异常
        function simulateAnomaly(type) {
            anomalySimulation = {
                active: true,
                type: type,
                endTime: Date.now() + 15000  // 15秒
            };
            
            const typeNames = {
                'low_spo2': '低血氧',
                'high_hr': '心动过速',
                'low_hr': '心动过缓'
            };
            
            addAlert('info', `🧪 开始模拟${typeNames[type]}异常 (持续15秒)`);
        }
        
        // 初始化
        window.onload = function() {
            initCharts();
            
            // 自动开始监测（可选）
            // setTimeout(() => startMonitoring(), 1000);
        };
    </script>
</body>
</html>

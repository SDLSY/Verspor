<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <title>长庚环 Logo</title>
  <desc>Black & white minimalist logo: crescent moon + orbit ring + stars + text.</desc>

  <!-- Background -->
  <rect width="1024" height="1024" fill="#ffffff"/>

  <!-- Mark -->
  <g transform="translate(512 380)">
    <!-- Crescent (built from two circles via path) -->
    <!-- Outer moon -->
    <path d="
      M 0,-170
      A 170,170 0 1 1 0,170
      A 170,170 0 1 1 0,-170
      Z"
      fill="#111111"/>
    <!-- Inner cut (shifted right) -->
    <path d="
      M 70,-150
      A 150,150 0 1 1 70,150
      A 150,150 0 1 1 70,-150
      Z"
      fill="#ffffff"/>

    <!-- Orbit ring (two thick arcs to mimic the 'Saturn ring' look) -->
    <g transform="rotate(-18)">
      <!-- Back arc -->
      <path d="M -320,40 A 360,150 0 0 1 320,40"
            fill="none" stroke="#111111" stroke-width="34" stroke-linecap="round"/>
      <!-- Front arc (slightly lower & thicker) -->
      <path d="M -340,70 A 390,165 0 0 0 340,70"
            fill="none" stroke="#111111" stroke-width="42" stroke-linecap="round"/>
      <!-- Inner highlight gap (creates the layered feel) -->
      <path d="M -332,70 A 382,158 0 0 0 332,70"
            fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" opacity="1"/>
    </g>

    <!-- Stars (simple 4-point sparkle using path) -->
    <g fill="#111111">
      <!-- Main sparkle -->
      <path d="M 210,-80
               L 228,-80 L 228,-98 L 236,-98 L 236,-80
               L 254,-80 L 254,-72 L 236,-72 L 236,-54
               L 228,-54 L 228,-72 L 210,-72 Z"/>
      <!-- Small sparkles -->
      <path d="M 155,-110
               L 164,-110 L 164,-119 L 169,-119 L 169,-110
               L 178,-110 L 178,-105 L 169,-105 L 169,-96
               L 164,-96 L 164,-105 L 155,-105 Z"/>
      <path d="M 250,-120
               L 257,-120 L 257,-127 L 261,-127 L 261,-120
               L 268,-120 L 268,-116 L 261,-116 L 261,-109
               L 257,-109 L 257,-116 L 250,-116 Z"/>
    </g>
  </g>

  <!-- Text -->
  <g transform="translate(512 720)" fill="#111111" text-anchor="middle">
    <text x="0" y="0"
          font-size="128"
          font-weight="700"
          letter-spacing="6"
          font-family="Noto Serif SC, Source Han Serif SC, Songti SC, STSong, SimSun, serif">长庚环</text>
  </g>
</svg>
